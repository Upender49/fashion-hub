<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Hub — Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #faf7f2; margin: 0; padding: 0; }
    .page { display: block; } /* Override display:none */
  </style>
</head>
<body>

<div id="page-admin" class="page active">
  <div class="admin-layout">
    <aside class="admin-sidebar" style="height: 100vh;">
      <div class="admin-sidebar-title">⚙ Admin Panel</div>
      <ul class="admin-nav">
        <li><a class="admin-nav-link active" data-section="overview" onclick="window.Admin.showSection('overview')">📊 Overview</a></li>
        <li><a class="admin-nav-link" data-section="products" onclick="window.Admin.showSection('products')">👗 Products</a></li>
        <li><a class="admin-nav-link" data-section="orders" onclick="window.Admin.showSection('orders')">📦 Orders</a></li>
        <li><a class="admin-nav-link" data-section="tryons" onclick="window.Admin.showSection('tryons')">✨ Try-Ons</a></li>
      </ul>
      <div style="margin-top:auto;padding:1rem">
        <button class="btn btn-outline btn-sm" style="width:100%;justify-content:center" onclick="window.location.href='index.html'">← Back to Site</button>
      </div>
    </aside>
    <main class="admin-main">
      <div id="admin-section-overview" class="admin-section">
        <h2 class="admin-page-title">Dashboard Overview</h2>
        <div class="admin-stats-grid" id="admin-stats"></div>
      </div>
      <div id="admin-section-products" class="admin-section" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
          <h2 class="admin-page-title" style="margin:0">Products</h2>
          <button class="btn btn-primary btn-sm" onclick="window.Admin.openProductModal()">+ Add Product</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="admin-products-table">
            <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div id="admin-section-orders" class="admin-section" style="display:none">
        <h2 class="admin-page-title">All Orders</h2>
        <div class="admin-table-wrap">
          <table class="admin-table" id="admin-orders-table">
            <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Update</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div id="admin-section-tryons" class="admin-section" style="display:none">
        <h2 class="admin-page-title">Try-On Requests</h2>
        <div class="admin-table-wrap">
          <table class="admin-table" id="admin-tryon-table">
            <thead><tr><th>Customer</th><th>Product</th><th>Status</th><th>Feedback</th><th>Date</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div id="product-modal-overlay" class="modal-overlay" style="display:none" onclick="window.Admin.closeProductModal()"></div>
<div id="product-modal" class="modal-box" style="display:none">
  <div class="modal-header">
    <span id="product-modal-title" style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700">Add Product</span>
    <button onclick="window.Admin.closeProductModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-muted)">✕</button>
  </div>
  <form id="product-form" onsubmit="window.Admin.submitProduct(event)">
    <input type="hidden" id="product-edit-id">
    <div class="form-row">
      <div class="form-group">
        <label>Product Name *</label>
        <input class="form-control" type="text" id="prod-name" placeholder="e.g. Floral Wrap Dress" required>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select class="form-control" id="prod-category" required>
          <option value="">Select...</option>
          <option>Dresses</option><option>Ethnic</option><option>Sets</option><option>Tops</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price (₹) *</label>
        <input class="form-control" type="number" id="prod-price" placeholder="e.g. 1299" required>
      </div>
      <div class="form-group">
        <label>Color *</label>
        <input class="form-control" type="text" id="prod-color" placeholder="e.g. Rose Pink" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Emoji (if no image)</label>
        <input class="form-control" type="text" id="prod-emoji" placeholder="e.g. 👗">
      </div>
      <div class="form-group">
        <label>Stock Qty</label>
        <input class="form-control" type="number" id="prod-stock" placeholder="10">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea class="form-control" id="prod-description" placeholder="Short description..."></textarea>
    </div>
    <div class="form-group">
      <label>Product Image</label>
      <input class="form-control" type="file" id="prod-image" accept="image/*" onchange="window.Admin.previewImage(this)">
      <div id="prod-img-preview" style="margin-top:8px"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center" id="product-submit-btn">Save Product</button>
      <button type="button" class="btn btn-outline" onclick="window.Admin.closeProductModal()">Cancel</button>
    </div>
  </form>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script type="module">
  import { state } from './js/state.js';
  import { Admin } from './js/modules/admin.js';
  import { Toast } from './js/utils/toast.js';

  // Expose global methods used by inline HTML handlers
  window.Admin = Admin;

  document.addEventListener('DOMContentLoaded', () => {
    const rawUser = localStorage.getItem('fh_user');
    const token = localStorage.getItem('fh_token');
    
    // Strict admin check right on mount!
    if (!rawUser || !token) {
      window.location.href = 'index.html';
      return;
    }
    
    const user = JSON.parse(rawUser);
    if (!user.isAdmin) {
      window.location.href = 'index.html';
      return;
    }
    
    // Auth passed, populate state and boot up Admin dashboard
    state.currentUser = user;
    Admin.init();
  });
</script>

</body>
</html>
